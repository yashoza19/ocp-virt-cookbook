name: Documentation Review

on:
  pull_request:
    paths:
      - '**.adoc'
      - 'antora.yml'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }} -- '*.adoc' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Run doc review
        if: steps.changed.outputs.empty == 'false'
        id: review
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(bash scripts/review-docs.sh ${{ steps.changed.outputs.files }} 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo "output<<REVIEW_EOF"
            echo "$OUTPUT"
            echo "REVIEW_EOF"
          } >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Comment on PR
        if: always() && steps.changed.outputs.empty == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.review.outputs.exit_code }}';
            const status = exitCode === '0' ? 'âś… Passed' : 'âťŚ Failed';
            const output = process.env.REVIEW_OUTPUT || 'No output';
            const body = `### Documentation Review ${status}\n\n\`\`\`\n${output}\n\`\`\``;

            // Delete previous bot comments for this check
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const comment of comments.data) {
              if (comment.body.startsWith('### Documentation Review')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.output }}
